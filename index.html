<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city name..." 
                    class="search-input"
                >
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <button id="geoBtn" class="geo-btn" title="Use current location">
                    <i class="fas fa-location-dot"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Loading Spinner -->
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <!-- Current Weather Section -->
            <section class="current-weather" id="currentWeather" style="display: none;">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="cityName"></h2>
                        <p id="date"></p>
                    </div>
                    <div class="temp-display">
                        <div class="temperature" id="temperature"></div>
                        <div class="weather-icon" id="weatherIcon"></div>
                    </div>
                </div>

                <div class="weather-description" id="weatherDescription"></div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-droplet"></i>
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity"></span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <span class="label">Wind Speed</span>
                        <span class="value" id="windSpeed"></span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-eye"></i>
                        <span class="label">Visibility</span>
                        <span class="value" id="visibility"></span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-compress"></i>
                        <span class="label">Pressure</span>
                        <span class="value" id="pressure"></span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-arrow-up"></i>
                        <span class="label">Feels Like</span>
                        <span class="value" id="feelsLike"></span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-sun"></i>
                        <span class="label">UV Index</span>
                        <span class="value" id="uvIndex"></span>
                    </div>
                </div>
            </section>

            <!-- Hourly Forecast -->
            <section class="hourly-forecast" id="hourlyForecast" style="display: none;">
                <h3>Hourly Forecast</h3>
                <div class="hourly-cards" id="hourlyCards"></div>
            </section>

            <!-- 7-Day Forecast -->
            <section class="forecast" id="forecast" style="display: none;">
                <h3>7-Day Forecast</h3>
                <div class="forecast-cards" id="forecastCards"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a></p>
            <p>© 2024 Weather Dashboard. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
